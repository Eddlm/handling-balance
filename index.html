<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handling Table</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --bg-soft: #0d1b31;
      --panel: rgba(12, 24, 44, 0.88);
      --panel-strong: rgba(9, 18, 34, 0.96);
      --ink: #e7eefb;
      --muted: #a9b8d0;
      --line: rgba(154, 177, 214, 0.18);
      --accent: #4dabf7;
      --accent-soft: rgba(77, 171, 247, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(77, 171, 247, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(13, 110, 253, 0.18), transparent 22%),
        linear-gradient(180deg, #0a1424 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    .glass-card {
      border: 1px solid rgba(154, 177, 214, 0.18);
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 1rem 2.5rem rgba(0, 0, 0, 0.28);
    }

    .meta {
      color: var(--muted);
      font-size: 0.98rem;
    }

    .count {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .search-input {
      border-radius: 999px;
      border-color: rgba(154, 177, 214, 0.18);
      background: rgba(10, 20, 36, 0.96);
      color: var(--ink);
      padding-left: 1rem;
    }

    .search-input:focus {
      border-color: rgba(77, 171, 247, 0.45);
      box-shadow: 0 0 0 0.25rem rgba(77, 171, 247, 0.16);
      background: rgba(10, 20, 36, 0.98);
      color: var(--ink);
    }

    .table-shell {
      overflow: hidden;
      border-radius: 1rem;
      border: 1px solid var(--line);
      background: var(--panel-strong);
    }

    .table-wrap {
      overflow: auto;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      display: none;
    }

    .drop-zone {
      border: 2px dashed rgba(154, 177, 214, 0.24);
      border-radius: 1rem;
      background: rgba(10, 20, 36, 0.7);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease, color 0.15s ease;
    }

    .drop-zone.drag-active {
      border-color: rgba(77, 171, 247, 0.7);
      background: rgba(77, 171, 247, 0.12);
      color: var(--ink);
    }

    .btn-outline-secondary {
      --bs-btn-color: #d8e3f7;
      --bs-btn-border-color: rgba(154, 177, 214, 0.3);
      --bs-btn-hover-color: #ffffff;
      --bs-btn-hover-bg: #163250;
      --bs-btn-hover-border-color: #4dabf7;
      --bs-btn-active-color: #ffffff;
      --bs-btn-active-bg: #1d4e89;
      --bs-btn-active-border-color: #5bb7ff;
    }

    .badge.text-bg-light {
      background: rgba(20, 37, 61, 0.95) !important;
      color: #d8e3f7 !important;
      border-color: rgba(154, 177, 214, 0.22) !important;
    }

    .table {
      --bs-table-bg: transparent;
      --bs-table-color: var(--ink);
      --bs-table-striped-bg: rgba(255, 255, 255, 0.025);
      --bs-table-striped-color: var(--ink);
      --bs-table-hover-bg: rgba(77, 171, 247, 0.08);
      --bs-table-hover-color: var(--ink);
      --bs-table-border-color: rgba(154, 177, 214, 0.14);
    }

    .table-light {
      --bs-table-bg: rgba(18, 34, 58, 0.98);
      --bs-table-color: #edf4ff;
      --bs-table-border-color: rgba(154, 177, 214, 0.14);
    }

    .progress {
      --bs-progress-bg: rgba(70, 78, 92, 0.85);
    }

    .progress-bar {
      color: #000000 !important;
    }

    .link-body-emphasis {
      color: #edf4ff !important;
    }

    .btn-link.link-body-emphasis:hover,
    .btn-link.link-body-emphasis:focus {
      color: #edf4ff !important;
    }

    code {
      color: #9fd3ff;
    }

    @media (max-width: 720px) {
      .table-shell {
        border-radius: 0.75rem;
      }
    }
  </style>
</head>

<body>
  <main class="container-xl py-4 py-md-5">
    <section class="card glass-card rounded-4">
      <div class="card-body p-3 p-md-4">
        <div class="row g-3 align-items-center mb-3">
          <div class="col-12 col-lg">
            <div class="meta">By default this loads my own basegame files, to help me out with balance. You can also drop your files for the same use!</div>
          </div>
          <div class="col-12 col-lg-auto">
            <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-2">
              <input id="searchInput" class="form-control search-input" type="search"
                placeholder="Filter by handling name">
              <div class="btn-group" role="group" aria-label="Display controls">
                <button type="button" id="unitMphButton" class="btn btn-outline-secondary active">mph</button>
                <button type="button" id="unitKphButton" class="btn btn-outline-secondary">kph</button>
              </div>
              <div class="btn-group" role="group" aria-label="Bar mode toggle">
                <button type="button" id="viewNumbersButton" class="btn btn-outline-secondary">numbers</button>
                <button type="button" id="viewBarsButton" class="btn btn-outline-secondary active">bars</button>
              </div>
              <input id="metaFileInput" type="file" accept=".meta,.xml,text/xml,application/xml" class="d-none" multiple>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="count" id="rowCount"></div>
          <div class="d-flex align-items-center gap-3">
            <span class="badge rounded-pill text-bg-light border">Click column headers to sort</span>
          </div>
        </div>
        <div class="d-flex flex-column flex-lg-row gap-2 mb-3">
          <div id="dropZone" class="drop-zone text-center p-3 flex-grow-1">
            Drop a <code>.meta</code> file here to load it.
          </div>
          <button type="button" id="loadHandlingButton" class="btn btn-outline-secondary">Load handling_basegame.meta</button>
        </div>
        <div class="table-shell">
          <div class="table-wrap">
            <table class="table table-striped table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col">
                    <button type="button" class="btn btn-link p-0 w-100 text-start text-decoration-none link-body-emphasis fw-semibold" data-key="handlingName">ID</button>
                  </th>
                  <th scope="col" class="text-end">
                    <button type="button" class="btn btn-link p-0 w-100 text-end text-decoration-none link-body-emphasis fw-semibold" data-key="driveForceScaled">Acceleration</button>
                  </th>
                  <th scope="col" class="text-end">
                    <button type="button" class="btn btn-link p-0 w-100 text-end text-decoration-none link-body-emphasis fw-semibold" data-key="braking">Braking</button>
                  </th>
                  <th scope="col" class="text-end">
                    <button type="button" class="btn btn-link p-0 w-100 text-end text-decoration-none link-body-emphasis fw-semibold" data-key="grip">Grip</button>
                  </th>
                  <th scope="col" class="text-end">
                    <button type="button" id="topSpeedHeader" class="btn btn-link p-0 w-100 text-end text-decoration-none link-body-emphasis fw-semibold" data-key="topSpeedMph">Top Speed (mph)</button>
                  </th>
                  <th scope="col" class="text-end">
                    <button type="button" class="btn btn-link p-0 w-100 text-end text-decoration-none link-body-emphasis fw-semibold" data-key="offroadPenalty">Offroad Penalty</button>
                  </th>
                  <th scope="col" class="text-end">
                    <button type="button" class="btn btn-link p-0 w-100 text-end text-decoration-none link-body-emphasis fw-semibold" data-key="clearanceM">Clearance (meters)</button>
                  </th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="empty" id="emptyState">No rows match the current filter.</div>
        </div>
      </div>
    </section>
  </main>
  <script>
    let rows = [];

    function getSpeedMph(speedMs) {
      return speedMs * 2.236936292;
    }

    function flatVelToEstimatedMaxSpeedMs(flatVel) {
      return (flatVel * 0.6213712 / 0.75) * 0.44704;
    }

    function calculateDragCoeffFromEstimatedTopSpeed(estimatedMaxSpeedMs, targetAcceleration) {
      const refSpeedDrag = Math.pow((estimatedMaxSpeedMs / 0.75) / 5, 2) / 2500;
      let dragCoeff = 0;

      for (let i = 1; i < 100; i += 0.01) {
        dragCoeff = Number(i.toFixed(2));
        const mathDrag = refSpeedDrag * dragCoeff;

        if (mathDrag > targetAcceleration) {
          break;
        }
      }

      return dragCoeff;
    }

    function getNumericValue(item, tagName) {
      const node = item.querySelector(tagName);
      if (!node) {
        return 0;
      }
      return Number(node.getAttribute('value') || 0);
    }

    function parseHandlingMeta(metaText) {
      const xml = new DOMParser().parseFromString(metaText, 'application/xml');
      const parseError = xml.querySelector('parsererror');
      if (parseError) {
        throw new Error('Failed to parse handling_basegame.meta');
      }

      return Array.from(xml.querySelectorAll('HandlingData > Item[type="CHandlingData"]'))
        .filter((item) => !item.querySelector('SubHandlingData Item[type="CFlyingHandlingData"], SubHandlingData Item[type="CBoatHandlingData"], SubHandlingData Item[type="CBikeHandlingData"], SubHandlingData Item[type="CSubmarineHandlingData"]'))
        .map((item) => ({
          handlingName: (item.querySelector('handlingName')?.textContent || '').trim(),
          fInitialDriveMaxFlatVel: getNumericValue(item, 'fInitialDriveMaxFlatVel'),
          fInitialDragCoeff: getNumericValue(item, 'fInitialDragCoeff'),
          fInitialDriveForce: getNumericValue(item, 'fInitialDriveForce'),
          fBrakeForce: getNumericValue(item, 'fBrakeForce'),
          fTractionCurveMax: getNumericValue(item, 'fTractionCurveMax'),
          fTractionLossMult: getNumericValue(item, 'fTractionLossMult'),
          clearanceM: getNumericValue(item, 'fSuspensionUpperLimit')
        }))
        .filter((row) => row.handlingName && row.fInitialDriveForce >= 0.01);
    }

    function isValidHandlingMeta(metaText) {
      const xml = new DOMParser().parseFromString(metaText, 'application/xml');
      if (xml.querySelector('parsererror')) {
        return false;
      }
      return Boolean(xml.querySelector('HandlingData'));
    }

    function buildRows(rawRows) {
      return rawRows.map((row) => ({
        estimatedDragCoeff: calculateDragCoeffFromEstimatedTopSpeed(
          flatVelToEstimatedMaxSpeedMs(row.fInitialDriveMaxFlatVel),
          row.fInitialDriveForce
        ),
        handlingName: row.handlingName,
        driveForceScaled: row.fInitialDriveForce ,
        braking: row.fBrakeForce * 4,
        grip: row.fTractionCurveMax,
        offroadPenalty: row.fTractionLossMult,
        topSpeedMph: getSpeedMph(flatVelToEstimatedMaxSpeedMs(row.fInitialDriveMaxFlatVel)),
        clearanceM: row.clearanceM
      }));
    }

    const state = {
      sortKey: 'handlingName',
      sortDir: 'asc',
      filter: '',
      speedUnit: 'mph',
      barMode: true
    };

    const body = document.getElementById('tableBody');
    const rowCount = document.getElementById('rowCount');
    const searchInput = document.getElementById('searchInput');
    const emptyState = document.getElementById('emptyState');
    const unitMphButton = document.getElementById('unitMphButton');
    const unitKphButton = document.getElementById('unitKphButton');
    const viewNumbersButton = document.getElementById('viewNumbersButton');
    const viewBarsButton = document.getElementById('viewBarsButton');
    const metaFileInput = document.getElementById('metaFileInput');
    const dropZone = document.getElementById('dropZone');
    const loadHandlingButton = document.getElementById('loadHandlingButton');
    const topSpeedHeader = document.getElementById('topSpeedHeader');
    const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });
    const metricMax = {
      driveForceScaled: 1,
      braking: 3,
      grip: 3,
      offroadPenalty: 1.5,
      topSpeedMph: 300,
      clearanceM: 0.5
    };

    function formatNumber(value, digits) {
      return value.toLocaleString(undefined, {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function getDisplayedTopSpeed(row) {
      return state.speedUnit === 'kph' ? row.topSpeedMph * 1.609344 : row.topSpeedMph;
    }

    function syncSpeedUnitUi() {
      topSpeedHeader.textContent = state.speedUnit === 'kph' ? 'Top Speed (kph)' : 'Top Speed (mph)';
      unitMphButton.classList.toggle('active', state.speedUnit === 'mph');
      unitKphButton.classList.toggle('active', state.speedUnit === 'kph');
      viewNumbersButton.classList.toggle('active', !state.barMode);
      viewBarsButton.classList.toggle('active', state.barMode);
    }

    function renderMetricCell(value, digits, maxValue) {
      const label = formatNumber(value, digits);
      if (!state.barMode) {
        return `<td class="text-end font-monospace">${label}</td>`;
      }

      const width = maxValue > 0 ? Math.max(4, Math.min(100, (value / maxValue) * 100)) : 0;
      const colorStops = [
        { at: 0, rgb: [125, 211, 252] },
        { at: 20, rgb: [13, 110, 253] },
        { at: 40, rgb: [25, 135, 84] },
        { at: 60, rgb: [255, 193, 7] },
        { at: 80, rgb: [253, 126, 20] },
        { at: 100, rgb: [220, 53, 69] }
      ];

      function interpolateColor(percent) {
        for (let i = 0; i < colorStops.length - 1; i += 1) {
          const start = colorStops[i];
          const end = colorStops[i + 1];
          if (percent >= start.at && percent <= end.at) {
            const span = end.at - start.at;
            const t = span === 0 ? 0 : (percent - start.at) / span;
            const rgb = start.rgb.map((value, index) => Math.round(value + ((end.rgb[index] - value) * t)));
            return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
          }
        }
        const last = colorStops[colorStops.length - 1].rgb;
        return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
      }

      const barColor = interpolateColor(width);
      return `
        <td class="text-end">
          <div class="progress" role="progressbar" aria-valuenow="${value}" aria-valuemin="0" aria-valuemax="${maxValue}">
            <div class="progress-bar text-end px-2 font-monospace" style="width: ${width}%; background-color: ${barColor};">${label}</div>
          </div>
        </td>
      `;
    }

    function renderTopSpeedCell(row) {
      const adjusted = getDisplayedTopSpeed(row);

      if (!state.barMode) {
        return `<td class="text-end font-monospace">${formatNumber(adjusted, 0)}</td>`;
      }

      const maxValue = state.speedUnit === 'kph' ? metricMax.topSpeedMph * 1.609344 : metricMax.topSpeedMph;
      const adjustedWidth = maxValue > 0 ? Math.max(4, Math.min(100, (adjusted / maxValue) * 100)) : 0;
      const colorStops = [
        { at: 0, rgb: [125, 211, 252] },
        { at: 20, rgb: [13, 110, 253] },
        { at: 40, rgb: [25, 135, 84] },
        { at: 60, rgb: [255, 193, 7] },
        { at: 80, rgb: [253, 126, 20] },
        { at: 100, rgb: [220, 53, 69] }
      ];

      function interpolateColor(percent) {
        for (let i = 0; i < colorStops.length - 1; i += 1) {
          const start = colorStops[i];
          const end = colorStops[i + 1];
          if (percent >= start.at && percent <= end.at) {
            const span = end.at - start.at;
            const t = span === 0 ? 0 : (percent - start.at) / span;
            const rgb = start.rgb.map((value, index) => Math.round(value + ((end.rgb[index] - value) * t)));
            return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
          }
        }
        const last = colorStops[colorStops.length - 1].rgb;
        return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
      }

      const adjustedColor = interpolateColor(adjustedWidth);
      return `
        <td class="text-end">
          <div class="position-relative" style="height: 1rem;">
            <div class="progress" role="progressbar" aria-valuenow="${adjusted}" aria-valuemin="0" aria-valuemax="${maxValue}">
              <div class="progress-bar text-end px-2 font-monospace" style="width: ${adjustedWidth}%; background-color: ${adjustedColor};">${formatNumber(adjusted, 0)}</div>
            </div>
          </div>
        </td>
      `;
    }

    function getVisibleRows() {
      const filters = state.filter
        .toLowerCase()
        .split(',')
        .map((value) => value.trim())
        .filter(Boolean);

      const filtered = filters.length
        ? rows.filter((row) => filters.some((filter) => row.handlingName.toLowerCase().includes(filter)))
        : [...rows];

      filtered.sort((a, b) => {
        const key = state.sortKey;
        let result = 0;

        if (typeof a[key] === 'number' && typeof b[key] === 'number') {
          result = a[key] - b[key];
        } else {
          result = collator.compare(String(a[key]), String(b[key]));
        }

        return state.sortDir === 'asc' ? result : -result;
      });

      return filtered;
    }

    function render() {
      const visible = getVisibleRows();
      body.innerHTML = visible.map((row) => `
        <tr>
          <td class="fw-semibold">${row.handlingName.toUpperCase()}</td>
          ${renderMetricCell(row.driveForceScaled, 2, metricMax.driveForceScaled)}
          ${renderMetricCell(row.braking, 2, metricMax.braking)}
          ${renderMetricCell(row.grip, 2, metricMax.grip)}
          ${renderTopSpeedCell(row)}
          ${renderMetricCell(row.offroadPenalty, 3, metricMax.offroadPenalty)}
          ${renderMetricCell(row.clearanceM, 3, metricMax.clearanceM)}
        </tr>
      `).join('');
      rowCount.textContent = `${visible.length} of ${rows.length} handling items`;
      emptyState.style.display = visible.length ? 'none' : 'block';
      syncSpeedUnitUi();
    }

    async function loadRows() {
      rowCount.textContent = 'Loading handling data...';
      emptyState.style.display = 'none';

      const response = await fetch(`./handling_basegame.meta?v=${Date.now()}`, {
        cache: 'no-store'
      });
      if (!response.ok) {
        throw new Error(`Failed to load handling_basegame.meta (${response.status})`);
      }

      const metaText = await response.text();
      rows = buildRows(parseHandlingMeta(metaText));
      render();
    }

    async function loadRowsFromFiles(files) {
      rowCount.textContent = files.length === 1
        ? `Loading ${files[0].name}...`
        : `Loading ${files.length} files...`;
      emptyState.style.display = 'none';

      const rawRows = [];
      for (const file of files) {
        const metaText = await file.text();
        if (!isValidHandlingMeta(metaText)) {
          throw new Error(`${file.name} is not a valid handling meta file`);
        }
        rawRows.push(...parseHandlingMeta(metaText));
      }

      rows = buildRows(rawRows);
      render();
    }

    async function handleMetaFiles(fileList) {
      const files = Array.from(fileList || []).filter(Boolean);
      if (!files.length) {
        return;
      }
      try {
        await loadRowsFromFiles(files);
      } catch (error) {
        console.error(error);
        rows = [];
        body.innerHTML = '';
        rowCount.textContent = `Failed to load ${files.length === 1 ? files[0].name : 'meta files'}`;
        emptyState.textContent = error.message || 'Could not parse the selected meta files.';
        emptyState.style.display = 'block';
      }
    }
    document.querySelectorAll('th button').forEach((button) => {
      button.addEventListener('click', () => {
        const key = button.dataset.key;
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = key;
          state.sortDir = key === 'handlingName' ? 'asc' : 'desc';
        }
        render();
      });
    });

    searchInput.addEventListener('input', (event) => {
      state.filter = event.target.value;
      render();
    });

    unitMphButton.addEventListener('click', () => {
      state.speedUnit = 'mph';
      render();
    });

    unitKphButton.addEventListener('click', () => {
      state.speedUnit = 'kph';
      render();
    });

    viewNumbersButton.addEventListener('click', () => {
      state.barMode = false;
      render();
    });

    viewBarsButton.addEventListener('click', () => {
      state.barMode = true;
      render();
    });

    metaFileInput.addEventListener('change', async (event) => {
      await handleMetaFiles(event.target.files);
      metaFileInput.value = '';
    });

    dropZone.addEventListener('click', () => {
      metaFileInput.click();
    });

    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropZone.classList.add('drag-active');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-active');
    });

    dropZone.addEventListener('drop', async (event) => {
      event.preventDefault();
      dropZone.classList.remove('drag-active');
      await handleMetaFiles(event.dataTransfer?.files);
    });

    loadHandlingButton.addEventListener('click', () => {
      loadRows().catch((error) => {
        console.error(error);
        rows = [];
        body.innerHTML = '';
        rowCount.textContent = 'Failed to load handling_basegame.meta';
        emptyState.textContent = 'Could not load handling_basegame.meta. If this page is opened as a local file, use drag-and-drop instead.';
        emptyState.style.display = 'block';
        syncSpeedUnitUi();
      });
    });

    loadRows().catch((error) => {
      console.error(error);
      rows = [];
      body.innerHTML = '';
      rowCount.textContent = 'Could not auto-load handling_basegame.meta';
      emptyState.textContent = 'Auto-load failed. Drop the file here to load it locally, or open this page through a local web server.';
      emptyState.style.display = 'block';
      syncSpeedUnitUi();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
